name: Build and deploy frontend to Azure Web App - biomedictrack-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies and build
        working-directory: frontend
        env:
          VITE_API_URL: https://biomedictrack-hwedf8cag6dbc2db.eastus-01.azurewebsites.net/api
        run: |
          npm ci
          chmod +x node_modules/.bin/vite
          npx vite build

      - name: Prepare frontend package
        run: |
          mkdir -p artifact
          cp frontend/package.json artifact/
          cp frontend/server.js artifact/
          cp -R frontend/dist artifact/dist
          ls -la artifact
          ls -la artifact/dist

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_ADC6CBBFEDDF4EB6BB05326830AC2299 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BB207E8AA6A848ADB0CD198D8B1ECD7E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8B0D9352A6754D27A14F6F92426104F5 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: biomedictrack-frontend-e8dkfpgrecfmh9fv
          slot-name: Production
          package: artifact
