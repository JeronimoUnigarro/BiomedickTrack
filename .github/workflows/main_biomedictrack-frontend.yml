name: Build and deploy frontend to Azure Web App - biomedictrack-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies and build
        working-directory: frontend
        env:
          VITE_API_URL: https://biomedictrack-hwedf8cag6dbc2db.eastus-01.azurewebsites.net/api
        run: |
          npm ci
          chmod +x node_modules/.bin/vite
          npx vite build

      - name: Prepare frontend package
        run: |
          mkdir -p artifact
          cp frontend/package.json artifact/
          cp frontend/server.js artifact/
          cp -R frontend/dist artifact/dist
          cd artifact
          zip -r ../frontend-app.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E0412858E76E47AF86E12DCC82E3274A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9FB90D7CEA9D40B6B7C5CF326ADB32B5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3548C14360F4438ABD36F4412981C4CA }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: biomedictrack-frontend
          slot-name: Production
          package: frontend-app.zip
